version: 2

# Read side: SRC_WORKSPACE_ID/LH_BRONZE_ID come from the Variable Library (same flow as
# profiles.yml). Per-developer value sets typically point these at the shared TEST bronze so
# local dev reads real data while writes stay in the developer's own workspace.
sources:
  - name: bronze
    description: Raw data from LH_Bronze
    tables:
      - name: publicholidays
        description: Public holidays reference table
        meta:
          plugin: duckrun
          delta_table_path: "abfss://{{ env_var('SRC_WORKSPACE_ID') }}@onelake.dfs.fabric.microsoft.com/{{ env_var('LH_BRONZE_ID') }}/Tables/dbo/publicholidays"
        columns:
          - name: countryOrRegion
            description: Country or region code (ISO 3166-1 alpha-2)
            # not_null only: a country appears once per holiday, so unique would (and did)
            # always fail — first surfaced 2026-07-07 by the first real `dbt build` run.
            tests:
              - not_null
      - name: scd2_test_source
        description: >
          Synthetic, deterministically-mutating fixture written by NB_scd2_test_mutator — exists
          solely to give `dbt snapshot` (check_cols strategy) something real to version. No
          business meaning; id=1 always changes price/category (must trigger a new snapshot
          version), id=2 always changes only notes (must NOT trigger one), a new row is inserted
          every run, and rows are occasionally hard-deleted.
        meta:
          plugin: duckrun
          delta_table_path: "abfss://{{ env_var('SRC_WORKSPACE_ID') }}@onelake.dfs.fabric.microsoft.com/{{ env_var('LH_BRONZE_ID') }}/Tables/dbo/scd2_test_source"
        columns:
          - name: id
            description: Natural key
            tests:
              - not_null
              - unique

  # The handover point of the dlt->dbt demo: NB_dlt_runner (config: ingest/github_issues.yml)
  # writes these Delta tables into LH_Bronze/Tables/github; from here on they are ordinary
  # dbt sources. Bronze is raw-append — an issue updated after ingestion appears as a second
  # row version, so `unique` on id would rightly fail here; stg_github_issues dedupes.
  - name: github
    description: GitHub issues loaded by dlt (NB_dlt_runner) — raw, append-only
    tables:
      - name: issues
        description: >
          Issues (and pull requests — GitHub's /issues endpoint includes them) of the
          repository configured in ingest/github_issues.yml, incremental on updated_at.
          Nested JSON is flattened by dlt (user -> user__login etc.); list fields land in
          child tables like github.issues__labels (not declared here — add them as sources
          when a model needs them).
        meta:
          plugin: duckrun
          delta_table_path: "abfss://{{ env_var('SRC_WORKSPACE_ID') }}@onelake.dfs.fabric.microsoft.com/{{ env_var('LH_BRONZE_ID') }}/Tables/github/issues"
        columns:
          - name: id
            description: GitHub's stable issue id (deduplication key for staging)
            tests:
              - not_null