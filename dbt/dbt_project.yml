# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'fabric_duckrun'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'fabric_duckrun'

# Since dbt 1.8 packages may not silently override built-in materializations; elementary's
# test materialization (which captures the failing rows into test_result_rows for the
# alerting samples) needs this opt-in — without it the runner's alert_message has no
# failing-row samples, and the elementary report lacks them too.
# The opt-in itself is deprecated (dbt will drop package overrides in a future major, at
# which point elementary must ship a migration) — silence exactly that one notice so it
# doesn't flood every run log with 26 occurrences; all other deprecations stay visible.
flags:
  require_explicit_package_overrides_for_builtin_materializations: false
  warn_error_options:
    silence:
      - PackageMaterializationOverrideDeprecation

# These configurations specify where dbt should look for different types of files.
# The `source-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
# analysis-paths: ["analyses"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]


target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# These settings can be overridden in the individual model files
# using the `{{ config(...) }}` macro.
models:
  fabric_duckrun:
    +schema: demo
    staging:
      +materialized: ephemeral
    marts:
      +materialized: table
  # Monitoring POC: elementary's result tables land in their own schema in the default
  # (Gold) catalog. generate_schema_name uses the custom name verbatim -> schema "elementary".
  elementary:
    +schema: elementary

# Silver tier = dbt snapshots (see README architecture notes). Routes every snapshot to the
# real LH_Silver Lakehouse by default via duckrun's 0.3.29 multi-catalog config (profiles.yml
# catalogs.silver), so a new snapshot can't accidentally land in the default (Gold) catalog.
snapshots:
  fabric_duckrun:
    +database: silver
